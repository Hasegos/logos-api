<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
    <!-- 배경 -->
    <rect width="1200" height="630" fill="#1a1a2e"/>

    <!-- 상단 보라색 라인 -->
    <rect width="1200" height="6" fill="#673AB7"/>

    <!-- 중앙 카드 -->
    <rect x="100" y="100" width="1000" height="430" rx="20"
          fill="#ffffff" opacity="0.05"/>

    <!-- 십자가 아이콘 -->
    <rect x="570" y="140" width="20" height="80" rx="4" fill="#673AB7"/>
    <rect x="545" y="165" width="70" height="20" rx="4" fill="#673AB7"/>

    <!-- 메인 타이틀 -->
    <text x="600" y="320"
          font-family="Georgia, serif"
          font-size="80"
          font-weight="bold"
          fill="#ffffff"
          text-anchor="middle">Logos API</text>

    <!-- 서브 타이틀 -->
    <text x="600" y="400"
          font-family="Arial, sans-serif"
          font-size="32"
          fill="#a78bfa"
          text-anchor="middle">Daily Bible Verse API</text>

    <!-- 설명 -->
    <text x="600" y="455"
          font-family="Arial, sans-serif"
          font-size="24"
          fill="#6b7280"
          text-anchor="middle">Free REST API for Korean Bible Verses</text>

    <!-- 하단 URL -->
    <text x="600" y="500"
          font-family="Arial, sans-serif"
          font-size="22"
          fill="#673AB7"
          text-anchor="middle">logos-api.com</text>

    <!-- 하단 보라색 라인 -->
    <rect y="624" width="1200" height="6" fill="#673AB7"/>
</svg>