<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <title>오류 | Logos API</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}">
    <link rel="stylesheet" th:href="@{/css/common/common.css}">
    <link rel="stylesheet" th:href="@{/css/page/error.css}">
</head>
<body>
    <div class="error-card">
        <p class="error-code"  th:text="${status}">오류</p>
        <p class="error-title" th:text="${title}">오류가 발생했습니다</p>
        <p class="error-msg"   th:text="${message}">잠시 후 다시 시도해 주세요.</p>
        <a href="/" class="back-btn">홈으로 돌아가기</a>
    </div>
</body>
</html>
